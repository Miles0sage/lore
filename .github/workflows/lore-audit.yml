name: lore-audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Lore audit snapshot
        run: |
          mkdir -p .lore/audits
          export LORE_MODE=public
          python -m lore.cli audit . --max-files 80 --max-chars 250000 || true

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lore-audit-report
          path: .lore/audits/
