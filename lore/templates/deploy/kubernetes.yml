# LORE DEPLOY: kubernetes
# StatefulSet for agents needing persistent identity (model routing state, memory)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agent-workers
  labels:
    app: lore-agents
spec:
  serviceName: agent-workers
  replicas: 3
  selector:
    matchLabels:
      app: lore-agents
  template:
    metadata:
      labels:
        app: lore-agents
    spec:
      containers:
        - name: agent
          image: your-registry/agent:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: database-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: agent-state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
data:
  redis-url: "redis://redis:6379"
  routing-rules: |
    {
      "test_writing": "tier-1",
      "feature": "tier-2",
      "architecture": "tier-3"
    }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-workers
spec:
  selector:
    app: lore-agents
  ports:
    - port: 8000
      targetPort: http
      name: http
  clusterIP: None
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agent-batch
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: batch
              image: your-registry/agent:latest
              command: ["python", "-m", "agent.batch"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: agent-secrets
                      key: database-url
          restartPolicy: OnFailure
